[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  BUN_VERSION = "1.2.21"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
