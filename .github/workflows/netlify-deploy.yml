name: Netlify production deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build with Bun and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -n "${NETLIFY_BUILD_HOOK_URL}" ]; then
            echo "Using Netlify build hook"
            curl -f -s -X POST "${NETLIFY_BUILD_HOOK_URL}"
          elif [ -n "${NETLIFY_AUTH_TOKEN}" ] && [ -n "${NETLIFY_SITE_ID}" ]; then
            echo "Using Netlify CLI deploy"
            bunx --bun netlify-cli deploy --prod --dir=dist --auth "${NETLIFY_AUTH_TOKEN}" --site "${NETLIFY_SITE_ID}"
          else
            echo "Netlify deployment is not configured."
            echo "Set NETLIFY_BUILD_HOOK_URL, or both NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID."
            exit 1
          fi
